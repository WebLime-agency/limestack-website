name: Claude Code Review

# Per-repo caller. The only Claude file each repo needs.
# All logic lives in the org reusable workflow; this just wires the trigger
# and forwards org secrets via `secrets: inherit`. The auth token lives in the
# reusable workflow, so this file never changes if billing/auth changes.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    uses: WebLime-agency/.github/.github/workflows/claude-review-reusable.yml@main
    secrets: inherit
