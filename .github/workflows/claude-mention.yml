name: Claude Code

# Optional per-repo caller for the @claude responder (issues + PR comments).
# Added only when rollout.sh is run with --with-mention.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    uses: WebLime-agency/.github/.github/workflows/claude-mention-reusable.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
